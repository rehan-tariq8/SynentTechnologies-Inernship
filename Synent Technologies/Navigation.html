<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f7fb;
        }

        .navbar-section {
            width: 100%;
            background-color: #0f172a;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: #3b82f6;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            justify-content: end;
            gap: 35px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 17px;
            transition: 0.3s;
        }

        .nav-menu a:hover {
            color: #3b82f6;
        }

        .nav-btn {
            width: 130px;
            height: 42px;
            border: none;
            border-radius: 25px;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background-color: #1d4ed8;
        }

        .menu-icon {
            color: white;
            font-size: 30px;
            cursor: pointer;
            display: none;
        }

        .hero-section {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to right, #1e293b, #0f172a);
            color: white;
        }

        .hero-section h1 {
            font-size: 65px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .hero-section p {
            font-size: 22px;
            color: #cbd5e1;
        }

        @media(max-width: 992px) {

            .menu-icon {
                display: block;
            }

            .nav-menu {
                position: absolute;
                top: 90px;
                left: 0;
                width: 100%;
                background-color: #0f172a;
                flex-direction: column;
                align-items: center;
                gap: 25px;
                padding: 30px 0;
                display: none;
            }

            .nav-menu.active {
                display: flex;
            }

            .hero-section h1 {
                font-size: 45px;
            }

            .hero-section p {
                font-size: 18px;
            }
        }

        @media(max-width: 576px) {

            .logo {
                font-size: 24px;
            }

            .hero-section h1 {
                font-size: 34px;
            }

            .hero-section p {
                font-size: 16px;
            }
        }
    </style>

</head>

<body>

    <section class="navbar-section">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-6">

                    <div class="logo">
                        Re<span>han</span>
                    </div>

                </div>

                <div class="col-6">

                    <div class="menu-icon text-end" onclick="toggleMenu()">

                        <i class="fa fa-bars"></i>

                    </div>

                    <div class="nav-menu" id="navMenu">

                        <a href="#">Home</a>
                        <a href="#">About</a>
                        <a href="#">Services</a>
                        <a href="#">Portfolio</a>
                        <a href="#">Contact</a>

                        <button class="nav-btn">
                            Get Started
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <section class="hero-section">

        <div class="container">

            <h1>
                Responsive Navigation Bar
            </h1>

            <p>
                Smooth navigation experience for desktop and mobile devices.
            </p>

        </div>

    </section>

    <script>

        function toggleMenu() {

            document.getElementById("navMenu").classList.toggle("active");

        }

    </script>

</body>

</html>
