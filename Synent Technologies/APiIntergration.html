<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            overflow-x: hidden;
        }

        .background-blur {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #7c3aed;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.4;
            top: -100px;
            left: -100px;
        }

        .background-blur2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #06b6d4;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
            bottom: -100px;
            right: -100px;
        }

        .main-box {
            position: relative;
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            z-index: 2;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .heading {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .heading h1 {
            font-size: 55px;
            font-weight: 700;
        }

        .heading p {
            color: #d1d5db;
            font-size: 18px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .search-box input {
            height: 60px;
            border-radius: 18px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            padding-left: 20px;
            font-size: 18px;
        }

        .search-box input::placeholder {
            color: #d1d5db;
        }

        .search-box button {
            width: 180px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-3px);
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            font-size: 20px;
            margin-top: 20px;
        }

        .error {
            display: none;
            text-align: center;
            background: rgba(255, 0, 0, 0.15);
            color: #fecaca;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .profile-card {
            display: none;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 35px;
            color: white;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        .profile-name {
            font-size: 35px;
            font-weight: 700;
            margin-top: 20px;
        }

        .username {
            color: #c4b5fd;
            font-size: 18px;
        }

        .bio {
            margin-top: 20px;
            color: #e5e7eb;
            line-height: 1.8;
        }

        .stats {
            margin-top: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .stat-box h2 {
            font-size: 35px;
            font-weight: 700;
        }

        .stat-box p {
            margin-top: 10px;
            color: #d1d5db;
        }

        .profile-link {
            margin-top: 30px;
        }

        .profile-link a {
            text-decoration: none;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
            color: white;
            padding: 15px 35px;
            border-radius: 15px;
            font-weight: 600;
            display: inline-block;
            transition: 0.3s;
        }

        .profile-link a:hover {
            transform: translateY(-3px);
        }

        @media(max-width:768px) {

            .main-box {
                padding: 25px;
            }

            .heading h1 {
                font-size: 38px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box button {
                width: 100%;
                height: 55px;
            }

            .profile-name {
                font-size: 28px;
            }

            .profile-img {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>

<body>

    <div class="background-blur"></div>
    <div class="background-blur2"></div>

    <div class="main-box">

        <div class="heading">
            <h1>GitHub Profile Finder</h1>
            <p>Search and display GitHub user data dynamically</p>
        </div>

        <div class="search-box">
            <input type="text" class="form-control" id="username"
                placeholder="Enter GitHub Username">
            <button onclick="getProfile()">Search Profile</button>
        </div>

        <div class="loading" id="loading">
            Loading Profile...
        </div>

        <div class="error" id="error">
            User not found. Please try another username.
        </div>

        <div class="profile-card" id="profileCard">

            <div class="text-center">
                <img src="" id="avatar" class="profile-img">
                <h2 class="profile-name" id="name"></h2>
                <p class="username" id="login"></p>
            </div>

            <p class="bio text-center" id="bio"></p>

            <div class="row stats g-4">

                <div class="col-lg-4 col-md-4 col-sm-12">
                    <div class="stat-box">
                        <h2 id="repos"></h2>
                        <p>Repositories</p>
                    </div>
                </div>

                <div class="col-lg-4 col-md-4 col-sm-12">
                    <div class="stat-box">
                        <h2 id="followers"></h2>
                        <p>Followers</p>
                    </div>
                </div>

                <div class="col-lg-4 col-md-4 col-sm-12">
                    <div class="stat-box">
                        <h2 id="following"></h2>
                        <p>Following</p>
                    </div>
                </div>

            </div>

            <div class="profile-link text-center">
                <a href="" target="_blank" id="profileBtn">
                    Visit GitHub Profile
                </a>
            </div>

        </div>

    </div>

    <script>

        async function getProfile() {

            let username = document.getElementById("username").value;

            let loading = document.getElementById("loading");
            let error = document.getElementById("error");
            let profileCard = document.getElementById("profileCard");

            loading.style.display = "block";
            error.style.display = "none";
            profileCard.style.display = "none";

            try {

                let response = await fetch(`https://api.github.com/users/${username}`);

                if (!response.ok) {
                    throw new Error("User Not Found");
                }

                let data = await response.json();

                document.getElementById("avatar").src = data.avatar_url;
                document.getElementById("name").innerHTML = data.name || "No Name";
                document.getElementById("login").innerHTML = "@" + data.login;
                document.getElementById("bio").innerHTML = data.bio || "No bio available";

                document.getElementById("repos").innerHTML = data.public_repos;
                document.getElementById("followers").innerHTML = data.followers;
                document.getElementById("following").innerHTML = data.following;

                document.getElementById("profileBtn").href = data.html_url;

                loading.style.display = "none";
                profileCard.style.display = "block";

            }

            catch (err) {

                loading.style.display = "none";
                error.style.display = "block";

            }

        }

    </script>

</body>

</html>
