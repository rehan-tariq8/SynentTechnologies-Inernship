<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Interface</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #e9e9e9;
        }

        .main-section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .login-container {
            width: 1100px;
            min-height: 650px;
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.2);
        }

        .left-side {
            width: 50%;
            background: linear-gradient(to bottom right, #020b3f, #0a1b72);
            color: white;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .left-content h4 {
            letter-spacing: 3px;
            margin-bottom: 120px;
            font-weight: bold;
        }

        .left-content h1 {
            font-size: 70px;
            font-weight: bold;
            line-height: 1.1;
        }

        .left-content p {
            font-size: 40px;
            color: #d1d5db;
            line-height: 1.2;
        }

        .right-side {
            width: 50%;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 380px;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.1);
        }

        .login-card h2 {
            font-weight: bold;
            margin-bottom: 10px;
            color: #111827;
        }

        .login-card p {
            color: gray;
            margin-bottom: 25px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .form-control {
            height: 48px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #d1d5db;
        }

        .form-control:focus {
            box-shadow: none;
            border: 1px solid #2563eb;
        }

        .forgot-text {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 20px;
        }

        .forgot-text a {
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 8px;
            background-color: #2563eb;
            color: white;
            font-size: 17px;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #1d4ed8;
        }

        @media(max-width: 992px) {

            .login-container {
                flex-direction: column;
            }

            .left-side,
            .right-side {
                width: 100%;
            }

            .left-content h1 {
                font-size: 50px;
            }

            .left-content p {
                font-size: 28px;
            }
        }

        @media(max-width: 576px) {

            .login-card {
                width: 100%;
            }

            .left-content h1 {
                font-size: 40px;
            }

            .left-content p {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <section class="main-section">

        <div class="login-container">

            <div class="left-side">

                <div class="left-content">

                    <h4>REHAN .</h4>

                    <h1>Login page</h1>

                    <p>
                        Start your journey <br>
                        now with us
                    </p>

                </div>

            </div>

            <div class="right-side">

                <div class="login-card">

                    <h2>Login to your account</h2>

                    <p>Welcome back! Please login below.</p>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email" class="form-control"
                                placeholder="Enter your email">

                        </div>

                        <div class="mb-2">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password" class="form-control"
                                placeholder="Enter your password">

                        </div>

                        <div class="forgot-text">
                            <a href="#">
                                Forgot Password?
                            </a>
                        </div>

                        <button type="submit" class="login-btn">
                            Login
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
